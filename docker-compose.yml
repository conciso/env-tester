---
services:
  envtester:
    build: .
    image: envtester:latest
    container_name: envtester
    environment:
      RUNNER_MODE: "${RUNNER_MODE:-query}"
      OPT_DIR: "${OPT_DIR:-/opt}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OPT_DIR:-/opt}/LightRAG:/opt/LightRAG
      - ${OPT_DIR:-/opt}/RAGChecker:/opt/RAGChecker
      - ${OPT_DIR:-/opt}/RAGIngester:/opt/RAGIngester
    networks:
      - aibox_network
    restart: "no"

networks:
  aibox_network:
    external: true
    name: aibox_network